<!DOCTYPE html>
<html lang="{{ .Localization.Language }}">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="./assets/icons/favicon.ico" sizes="any" />
	<link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon-180x180.png" />
	<link rel="stylesheet" href="./css/style.css" />
	<title>{{ .Localization.Title }}</title>
	<script>
		(function () {
			const theme = localStorage.getItem('theme');
			if (theme) {
				document.documentElement.setAttribute('data-theme', theme);
			}
		})();
	</script>
</head>

<body>
	<div id="app-bar">
		<!-- App Bar Left -->
		<div id="app-bar-left">
			<button
				id="date-picker-button"
				onclick="openDatePicker()"
				data-year="{{ .DatePickerYear }}"
				data-month="{{ .DatePickerMonth }}"
			>
				<input type="date" style="display: none;"/>
				{{ .DatePickerContent }}
			</button>
		</div>
		<!-- App Bar Center -->
		<div id="app-bar-center"></div>
		<!-- App Bar Right -->
		<div id="app-bar-right">
			<button
				id="theme-toggle-button"
				onclick="toggleTheme()"
			>
				<span class="theme-icon"></span>
			</button>
		</div>
	</div>

	<div
		id="calendar-swipe"
		onpointermove="onPointerMove(event)"
		onpointerdown="onPointerDown(event)"
		onpointerup="onPointerUp(event)"
		onpointercancel="onPointerCancel(event)"
		onpointerleave="onPointerLeave(event)"
	>
		<!-- Previous Month -->
		{{ range .Grids }}
		<div class="grid-container" data-year="{{ .Year }}" data-month="{{ .Month }}">
			<table class="grid">
				<thead>
					<tr>
						{{ range .WeekDays }}
						<th class="week-day">{{ . }}</th>
						{{ end }}
					</tr>
				</thead>
				<tbody>
					{{ range .Rows }}
					<tr class="row">
						{{ range . }}
						<td class="grid-cell{{ if .IsToday }} grid-cell-is-today{{ end }}{{ if .IsCurrentMonth }} grid-cell-is-current-month{{ end }}">
							{{ if .IsCurrentMonth }}<span class="date">{{ .Date }}</span>{{ end }}
						</td>
						{{ end }}
					</tr>
					{{ end }}
				</tbody>
			</table>
		</div>
		{{ end }}
	</div>

	<script src="./wasm_exec.js"></script>

	<script>
		const go = new Go();
		WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
			.then(result => {
				go.run(result.instance);
		});

		function openDatePicker() {
			// Show date picker and update the button text with the selected date
			var input = document.querySelector("#date-picker-button input");
			input.click();
		}

		// Handle date selection and update button text
		var input = document.querySelector("#date-picker-button input");
		input.addEventListener("change", function(event) {
			document.querySelector("#date-picker-button").textContent = event.currentTarget.value;
		});

		function toggleTheme() {
			var html = document.documentElement;
			var attr = html.getAttribute('data-theme');
			var isDark = attr === 'dark' || (!attr && window.matchMedia('(prefers-color-scheme: dark)').matches);
			html.setAttribute('data-theme', isDark ? 'light' : 'dark');
			localStorage.setItem('theme', isDark ? 'light' : 'dark');
		}
	</script>
</body>

</html>
