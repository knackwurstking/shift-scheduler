<!DOCTYPE html>
<html lang="{{ .Localization.Language }}">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" href="/assets/icons/favicon.ico" sizes="any" />
	<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon-180x180.png" />
	<link rel="stylesheet" href="css/style.css" />
	<title>{{ .Localization.Title }}</title>
	<script>
		(function () {
			const theme = localStorage.getItem('theme') || 'light';
			if (theme === 'dark') {
				document.documentElement.classList.add('dark');
			}
		})();
	</script>
</head>

<body>
	<div id={ IDAppBar }>
		<!-- TODO: App Bar Left -->
		<div id={ IDAppBarLeft }>
			{{ d := time.Now() }}
			// Date picker button
			<button
				id={ IDDatePickerButton }
				onclick={ onDatePickerButtonClick(IDDatePickerButton) }
				data-year={d.Year()}
				data-month={d.Month()}
			>
				<input type="data" style="display: none;"/>
				{ d.Format(DatePickerFormat) }
			</button>
		</div>
		<!-- TODO: App Bar Center -->
		<div id={ IDAppBarCenter }></div>
		<!-- TODO: App Bar Right -->
		<div id={ IDAppBarRight }>
			<button
				id={ IDThemeToggleButton }
				onclick={ onThemeToggleClick() }
			>
				<span class="theme-icon"></span>
			</button>
		</div>
	</div>
	<script src="wasm_exec.js"></script>
	<script>
		const go = new Go();
		WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject)
			.then(result => {
				go.run(result.instance);
		});
	</script>
</body>

</html>
